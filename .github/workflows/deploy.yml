name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy

          # Каждое приложение имеет свой standalone — мержим в одну папку
          # Берём базу (node_modules, package.json) из landing
          cp -r apps/landing/.next/standalone/* deploy/

          # Докопируем server.js и .next из web и admin
          cp -r apps/web/.next/standalone/apps/web deploy/apps/web
          cp -r apps/admin/.next/standalone/apps/admin deploy/apps/admin

          # Копируем static assets и public для каждого
          for app in landing web admin; do
            mkdir -p deploy/apps/$app/.next/static
            cp -r apps/$app/.next/static/* deploy/apps/$app/.next/static/ 2>/dev/null || true
            cp -r apps/$app/public deploy/apps/$app/public 2>/dev/null || true
          done

          # Env
          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" > deploy/.env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> deploy/.env
          echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> deploy/.env

          tar -czf deploy.tar.gz -C deploy .

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 5.129.203.13
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy.tar.gz
          target: /tmp

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.129.203.13
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            # Node.js
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            # PM2
            command -v pm2 >/dev/null 2>&1 || npm install -g pm2

            # Распаковываем в новую папку
            rm -rf /opt/kf-academy-new
            mkdir -p /opt/kf-academy-new
            tar -xzf /tmp/deploy.tar.gz -C /opt/kf-academy-new
            rm -f /tmp/deploy.tar.gz

            # Env
            for app in landing web admin; do
              cp /opt/kf-academy-new/.env /opt/kf-academy-new/apps/$app/.env 2>/dev/null || true
            done

            # Останавливаем старые процессы
            pm2 delete kf-landing 2>/dev/null || true
            pm2 delete kf-web 2>/dev/null || true
            pm2 delete kf-admin 2>/dev/null || true

            # Заменяем
            rm -rf /opt/kf-academy
            mv /opt/kf-academy-new /opt/kf-academy
            cd /opt/kf-academy

            # Запускаем — каждый server.js с указанием рабочей директории корня monorepo
            PORT=4000 pm2 start apps/landing/server.js --name kf-landing
            PORT=3001 pm2 start apps/web/server.js --name kf-web
            PORT=3002 pm2 start apps/admin/server.js --name kf-admin

            pm2 save
            echo "Deploy complete!"
