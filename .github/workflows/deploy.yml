name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy

          # Копируем всю standalone-структуру (содержит node_modules, apps, packages)
          cp -r apps/landing/.next/standalone/* deploy/

          # Для каждого приложения копируем static и public
          for app in landing web admin; do
            mkdir -p deploy/apps/$app/.next/static
            cp -r apps/$app/.next/static/* deploy/apps/$app/.next/static/ 2>/dev/null || true
            cp -r apps/$app/public deploy/apps/$app/public 2>/dev/null || true
          done

          # Env файл
          cat > deploy/.env <<ENVEOF
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          ENVEOF

          # Архивируем
          tar -czf deploy.tar.gz -C deploy .

      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 5.129.203.13
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          source: deploy.tar.gz
          target: /tmp

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.129.203.13
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e

            # Node.js
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            # PM2
            command -v pm2 >/dev/null 2>&1 || npm install -g pm2

            # Распаковываем
            rm -rf /opt/kf-academy-new
            mkdir -p /opt/kf-academy-new
            tar -xzf /tmp/deploy.tar.gz -C /opt/kf-academy-new
            rm -f /tmp/deploy.tar.gz

            # Env для каждого приложения
            for app in landing web admin; do
              cp /opt/kf-academy-new/.env /opt/kf-academy-new/apps/$app/.env 2>/dev/null || true
            done

            # Останавливаем старые
            pm2 delete kf-landing 2>/dev/null || true
            pm2 delete kf-web 2>/dev/null || true
            pm2 delete kf-admin 2>/dev/null || true

            # Заменяем старую версию
            rm -rf /opt/kf-academy
            mv /opt/kf-academy-new /opt/kf-academy

            # Запускаем
            cd /opt/kf-academy
            PORT=3000 pm2 start apps/landing/server.js --name kf-landing --cwd /opt/kf-academy
            PORT=3001 pm2 start apps/web/server.js --name kf-web --cwd /opt/kf-academy
            PORT=3002 pm2 start apps/admin/server.js --name kf-admin --cwd /opt/kf-academy

            pm2 save
            echo "Deploy complete!"
